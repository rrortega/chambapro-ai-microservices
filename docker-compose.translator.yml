services:
  translator:
    build:
      context: ./docker/ai/translator
    environment:
      TRANSLATION_MODEL: facebook/nllb-200-distilled-600M
      DEVICE: cpu
      COMPUTE_TYPE: int8
    volumes:
      - translation-models:/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  translation-models:

networks:
  default:
    name: ${EXTERNAL_NETWORK:-chambapro_ai_default}
    external: ${USE_EXTERNAL_NETWORK:-false}
