services:
  gateway:
    build:
      context: .
    environment:
      - AI_EMBEDDINGS_PROVIDER=local
      - AI_EMBEDDINGS_LOCAL_URL=http://embeddings:8080/v1/embeddings
      - AI_TRANSLATION_PROVIDER=local
      - AI_TRANSLATION_LOCAL_URL=http://translator:8000/v1/translations
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - INTERNAL_AI_API_KEY=secreto_interno
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - embeddings
      - translator
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data


  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    platform: linux/amd64
    command:
      - --model-id
      - intfloat/multilingual-e5-small
      - --port
      - "8080"
      - --served-model-name
      - multilingual-e5-small
      - --max-batch-requests
      - "8"
      - --max-client-batch-size
      - "8"
      - --max-concurrent-requests
      - "64"
      - --max-batch-tokens
      - "2048"
      - --tokenization-workers
      - "2"
    volumes:
      - ${EMBEDDINGS_HOST_DIR:-embedding-models}:/data
    environment:
      HF_HOME: /data
      HUGGINGFACE_HUB_CACHE: /data
      OMP_NUM_THREADS: "2"
      RAYON_NUM_THREADS: "2"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 3G

  translator:
    build:
      context: ./docker/ai/translator
    environment:
      TRANSLATION_MODEL: facebook/nllb-200-distilled-600M
      DEVICE: cpu
      COMPUTE_TYPE: int8
      HF_HOME: /models/.cache
      HUGGINGFACE_HUB_CACHE: /models/.cache
    volumes:
      - ${TRANSLATOR_HOST_DIR:-translation-models}:/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  embedding-models:
  translation-models:
  redis-data:

networks:
  default:
    name: ${EXTERNAL_NETWORK:-chambapro_ai_default}
    external: ${USE_EXTERNAL_NETWORK:-false}
