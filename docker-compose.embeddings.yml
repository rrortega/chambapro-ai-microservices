services:
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    platform: linux/amd64
    command:
      - --model-id
      - intfloat/multilingual-e5-small
      - --port
      - "80"
      - --served-model-name
      - multilingual-e5-small
      - --max-batch-requests
      - "8"
      - --max-client-batch-size
      - "8"
      - --max-concurrent-requests
      - "64"
      - --max-batch-tokens
      - "2048"
      - --tokenization-workers
      - "2"
    volumes:
      - ${EMBEDDINGS_HOST_DIR:-embedding-models}:/data
    environment:
      HF_HOME: /data
      OMP_NUM_THREADS: "2"
      RAYON_NUM_THREADS: "2"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 3G

volumes:
  embedding-models:

networks:
  default:
    name: ${EXTERNAL_NETWORK:-chambapro_ai_default}
    external: ${USE_EXTERNAL_NETWORK:-false}
